 
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gift Boxes</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0f172a;
    font-family:Arial;
    color:white;
}

/* container */
.grid{
    width:90vw;
    max-width:350px;
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
}

/* boxes */
.box{
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    padding:20px;
    border-radius:12px;
    text-align:center;
    cursor:pointer;
    transition:0.3s;
    font-size:14px;
}

.box:hover{
    transform:scale(1.05);
}

.opened{
    background:#1e293b;
}
</style>
</head>

<body>

<div class="grid">

<div class="box" onclick="openBox(this,'👗 Kurti')">🎁 Box 1</div>
<div class="box" onclick="openBox(this,'💎 Jhumka')">🎁 Box 2</div>
<div class="box" onclick="openBox(this,'👗 Dress')">🎁 Box 3</div>
<div class="box" onclick="openBox(this,'💍 Silver Ring')">🎁 Box 4</div>
<div class="box" onclick="openBox(this,'🔑 Keychain')">🎁 Box 5</div>
<div class="box" onclick="openBox(this,'🍗 Shawarma')">🎁 Box 6</div>
<div class="box" onclick="openBox(this,'🤗 Hug')">🎁 Box 7</div>
<div class="box" onclick="openBox(this,'🍫 Surprise Treat')">🎁 Box 8</div>
<div class="box" onclick="openBox(this,'🌸 Cute Note')">🎁 Box 9</div>
<div class="box" onclick="openBox(this,'💎 PREMIUM: Adnan')">🎉 FINAL BOX</div>

</div>

<script>

function openBox(el, gift){

    if(el.classList.contains("opened")) return;

    el.classList.add("opened");
    el.innerHTML = gift;

    if(gift.includes("PREMIUM")){
        setTimeout(()=>{
            alert("🎉 CONGRATULATIONS!\nYou unlocked Premium Gift: Adnan 💎");
        },300);
    }
}

</script>

</body>
</html>
