<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Final Step</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#312e81,#4c1d95);
    color:white;
    padding:20px;
}

.card{
    width:100%;
    max-width:600px;
    text-align:center;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border-radius:25px;
    padding:40px 25px;
    border:1px solid rgba(255,255,255,0.15);
    animation:fadeIn 1.5s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

h1{
    font-size:30px;
    margin-bottom:20px;
}

p{
    font-size:16px;
    line-height:1.9;
    color:#e2e8f0;
    margin-bottom:20px;
}

button{
    margin-top:20px;
    padding:14px 30px;
    border:none;
    border-radius:50px;
    font-size:16px;
    cursor:pointer;
    font-weight:600;
    background:white;
    color:#312e81;
    transition:0.3s;
}

button:hover{
    transform:translateY(-3px);
}
</style>
</head>

<body>

<div class="card">

<h1>💭 One Last Thing</h1>

<p>
This wasn’t a quiz to test you…  
<br><br>
It was just a small reminder that you matter, and your smile is important.
<br><br>
Now there’s one last thing waiting for you.
</p>

<button onclick="window.location.href='gift.html'">
Open Your Gift 🎁
</button>

</div>

</body>
</html>
