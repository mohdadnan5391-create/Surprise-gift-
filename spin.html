<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fixed Premium Wheel</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:radial-gradient(circle,#1e1b4b,#0f172a);
    font-family:Poppins;
    color:white;
}

h1{margin-bottom:10px;}

.wheel-container{
    position:relative;
    width:320px;
    height:320px;
}

.pointer{
    position:absolute;
    top:-18px;
    left:50%;
    transform:translateX(-50%);
    width:0;height:0;
    border-left:14px solid transparent;
    border-right:14px solid transparent;
    border-bottom:22px solid white;
    z-index:10;
}

.wheel{
    width:100%;
    height:100%;
    border-radius:50%;
    position:relative;
    border:8px solid rgba(255,255,255,0.2);
    transition:transform 5.5s cubic-bezier(0.1,0.7,0.1,1);
    overflow:hidden;
}

.segment{
    position:absolute;
    width:50%;
    height:50%;
    left:50%;
    top:50%;
    transform-origin:0% 0%;
    clip-path:polygon(0 0,100% 0,0 100%);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:11px;
    color:white;
}

/* colors */
.s1{background:#6366f1;}
.s2{background:#8b5cf6;}
.s3{background:#ec4899;}
.s4{background:#14b8a6;}
.s5{background:#f59e0b;}
.s6{background:#22c55e;}
.s7{background:#3b82f6;}
.s8{background:#ef4444;}
.s9{background:#a855f7;}
.s10{background:linear-gradient(45deg,#ffd700,#ffb800); font-weight:bold;}

button{
    margin-top:25px;
    padding:12px 24px;
    border:none;
    border-radius:30px;
    font-size:16px;
    cursor:pointer;
    font-weight:600;
}

.result{
    margin-top:15px;
    text-align:center;
}
</style>
</head>

<body>

<h1>🎡 Gift Wheel</h1>

<div class="wheel-container">
<div class="pointer"></div>

<div class="wheel" id="wheel">

<div class="segment s1" style="transform:rotate(0deg) skewY(-54deg)">👗 Kurti</div>
<div class="segment s2" style="transform:rotate(36deg) skewY(-54deg)">💎 Jhumka</div>
<div class="segment s3" style="transform:rotate(72deg) skewY(-54deg)">👗 Dress</div>
<div class="segment s4" style="transform:rotate(108deg) skewY(-54deg)">💍 Ring</div>
<div class="segment s5" style="transform:rotate(144deg) skewY(-54deg)">🔑 Keychain</div>
<div class="segment s6" style="transform:rotate(180deg) skewY(-54deg)">🍗 Shawarma</div>
<div class="segment s7" style="transform:rotate(216deg) skewY(-54deg)">🤗 Hug</div>
<div class="segment s8" style="transform:rotate(252deg) skewY(-54deg)">🍫 Choco</div>
<div class="segment s9" style="transform:rotate(288deg) skewY(-54deg)">🌸 Care</div>
<div class="segment s10" style="transform:rotate(324deg) skewY(-54deg)">💎 ADNAN</div>

</div>
</div>

<button id="btn" onclick="spin()">SPIN 🎯 (3 left)</button>

<div class="result" id="result"></div>

<script>

let spins = 3;
let rotation = 0;

const angle = 360/10;

function spin(){

    if(spins <= 0) return;

    spins--;

    const wheel = document.getElementById("wheel");
    const btn = document.getElementById("btn");
    const result = document.getElementById("result");

    let index;

    // FORCE PREMIUM ON LAST SPIN
    if(spins === 0){
        index = 9;
    }else{
        index = Math.floor(Math.random()*9);
    }

    const extraSpins = 6 * 360;

    const target = (360 - (index * angle)) - (angle/2);

    rotation += extraSpins + target;

    wheel.style.transform = `rotate(${rotation}deg)`;

    setTimeout(()=>{

        if(index === 9){
            showFinal();
        }else{
            result.innerHTML = "🎁 You got: " + document.querySelectorAll(".segment")[index].innerText;
        }

        if(spins === 0){
            btn.disabled = true;
            btn.innerText = "No Spins Left";
        }

    },5500);
}

function showFinal(){
    document.body.innerHTML = `
        <div style="text-align:center;color:white;">
            <h1>🎉 CONGRATULATIONS 🎉</h1>
            <h2>💎 PREMIUM GIFT UNLOCKED</h2>
            <p style="font-size:18px;margin-top:20px;">
            Adnan<br><br>
            A special person who will stay, care, and support you in his own way 🤍
            </p>
        </div>
    `;

    launchConfetti();
}

function launchConfetti(){
    for(let i=0;i<120;i++){
        let d=document.createElement("div");
        d.innerHTML="🎉";
        d.style.position="fixed";
        d.style.left=Math.random()*100+"vw";
        d.style.top="-10px";
        d.style.fontSize="18px";
        d.style.animation="fall 3s linear";
        document.body.appendChild(d);
        setTimeout(()=>d.remove(),3000);
    }
}

</script>

<style>
@keyframes fall{
    to{
        transform:translateY(110vh) rotate(360deg);
        opacity:0;
    }
}
</style>

</body>
</html>
