<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Surprise</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#312e81,#4c1d95);
    color:white;
    padding:20px;
    overflow:auto;
}

.card{
    width:100%;
    max-width:600px;
    text-align:center;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border-radius:25px;
    padding:40px 25px;
    border:1px solid rgba(255,255,255,0.15);
    animation:fadeIn 1.5s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

h1{
    font-size:30px;
    margin-bottom:20px;
}

p{
    font-size:16px;
    line-height:1.9;
    color:#e2e8f0;
    margin-bottom:20px;
}

.box{
    margin-top:25px;
    padding:20px;
    border-radius:15px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    text-align:left;
    font-size:14px;
    display:none;
}

button{
    margin-top:20px;
    padding:14px 28px;
    border:none;
    border-radius:50px;
    font-size:16px;
    cursor:pointer;
    font-weight:600;
    background:white;
    color:#312e81;
    transition:0.3s;
}

button:hover{
    transform:translateY(-3px);
}
</style>
</head>

<body>

<div class="card">

<h1>🎁 Your Journey Ends Here</h1>

<p>
This was never just a quiz.
<br><br>
It was my way of reminding you something very simple…
<br><br>
You matter. Your happiness matters. And you are never alone in what you feel.
<br><br>
Thank you for taking this little journey with me. 🤍
</p>

<button onclick="showAnswers()">
Reveal My Answers ✨
</button>

<div class="box" id="answers">

<h3>💭 Your Responses</h3>
<br>

<p id="a1"></p>
<p id="a2"></p>
<p id="a3"></p>
<p id="a4"></p>
<p id="a5"></p>
<p id="a6"></p>
<p id="a7"></p>
<p id="a8"></p>
<p id="a9"></p>

</div>

</div>

<script>
function showAnswers(){

    document.getElementById("answers").style.display="block";

    document.getElementById("a1").innerHTML = "Q1: " + localStorage.getItem("q1");
    document.getElementById("a2").innerHTML = "Q2: " + localStorage.getItem("q2");
    document.getElementById("a3").innerHTML = "Q3: " + localStorage.getItem("q3");
    document.getElementById("a4").innerHTML = "Q4: " + localStorage.getItem("q4");
    document.getElementById("a5").innerHTML = "Q5: " + localStorage.getItem("q5");
    document.getElementById("a6").innerHTML = "Q6: " + localStorage.getItem("q6");
    document.getElementById("a7").innerHTML = "Q7: " + localStorage.getItem("q7");
    document.getElementById("a8").innerHTML = "Q8: " + localStorage.getItem("q8");
    document.getElementById("a9").innerHTML = "Q9: " + localStorage.getItem("q9");

}
</script>

</body>
</html>
