<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Final Gift Wheel</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:radial-gradient(circle at top,#1e1b4b,#0f172a);
    color:white;
    overflow:hidden;
}

h1{margin-bottom:8px;}
.sub{margin-bottom:20px;color:#cbd5e1;font-size:13px;}

.container{
    position:relative;
    width:320px;
    height:320px;
}

.pointer{
    position:absolute;
    top:-18px;
    left:50%;
    transform:translateX(-50%);
    width:0;height:0;
    border-left:14px solid transparent;
    border-right:14px solid transparent;
    border-bottom:22px solid white;
    z-index:10;
    filter:drop-shadow(0 0 5px white);
}

.wheel{
    width:100%;
    height:100%;
    border-radius:50%;
    border:8px solid rgba(255,255,255,0.15);
    box-shadow:0 0 25px rgba(255,255,255,0.1);
    position:relative;
    transition:transform 6s cubic-bezier(0.12,0.8,0.12,1);
}

/* clean segments */
.segment{
    position:absolute;
    width:50%;
    height:50%;
    left:50%;
    top:50%;
    transform-origin:0% 0%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:11px;
    color:white;
}

/* colors */
.s1{background:#6366f1;}
.s2{background:#8b5cf6;}
.s3{background:#ec4899;}
.s4{background:#14b8a6;}
.s5{background:#f59e0b;}
.s6{background:#22c55e;}
.s7{background:#3b82f6;}
.s8{background:#ef4444;}
.s9{background:#a855f7;}
.s10{
    background:linear-gradient(45deg,#ffd700,#ffb800);
    font-weight:700;
    animation:glow 1.5s infinite;
}

@keyframes glow{
    0%{filter:brightness(1);}
    50%{filter:brightness(1.4);}
    100%{filter:brightness(1);}
}

button{
    margin-top:25px;
    padding:12px 26px;
    border:none;
    border-radius:30px;
    font-size:15px;
    cursor:pointer;
    font-weight:600;
    background:white;
    color:#312e81;
}

button:disabled{
    opacity:0.5;
    cursor:not-allowed;
}

/* overlay */
.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.85);
    display:none;
    justify-content:center;
    align-items:center;
    text-align:center;
    z-index:999;
}

.card{
    background:rgba(255,255,255,0.1);
    padding:25px;
    border-radius:20px;
    border:1px solid rgba(255,255,255,0.2);
    animation:pop 0.4s ease;
}

@keyframes pop{
    from{transform:scale(0.6);opacity:0;}
    to{transform:scale(1);opacity:1;}
}

.big{font-size:28px;margin-bottom:10px;}
</style>
</head>

<body>

<h1>🎡 Gift Wheel</h1>
<div class="sub">Only 3 spins available</div>

<div class="container">
<div class="pointer"></div>

<div class="wheel" id="wheel">

<div class="segment s1" style="transform:rotate(0deg)">👗 Kurti</div>
<div class="segment s2" style="transform:rotate(36deg)">💎 Jhumka</div>
<div class="segment s3" style="transform:rotate(72deg)">👗 Dress</div>
<div class="segment s4" style="transform:rotate(108deg)">💍 Ring</div>
<div class="segment s5" style="transform:rotate(144deg)">🔑 Keychain</div>
<div class="segment s6" style="transform:rotate(180deg)">🍗 Shawarma</div>
<div class="segment s7" style="transform:rotate(216deg)">🤗 Hug</div>
<div class="segment s8" style="transform:rotate(252deg)">🍫 Choco</div>
<div class="segment s9" style="transform:rotate(288deg)">🌸 Care</div>
<div class="segment s10" style="transform:rotate(324deg)">💎 ADNAN</div>

</div>
</div>

<button id="btn" onclick="spin()">SPIN 🎯</button>

<div class="overlay" id="overlay">
    <div class="card">
        <div class="big" id="title"></div>
        <div id="msg"></div>
    </div>
</div>

<canvas id="confetti"></canvas>

<script>

let spins = 3;
let rotation = 0;
const angle = 360/10;

const wheel = document.getElementById("wheel");
const btn = document.getElementById("btn");
const overlay = document.getElementById("overlay");
const title = document.getElementById("title");
const msg = document.getElementById("msg");

function spin(){

    if(spins <= 0) return;

    spins--;

    let index;

    if(spins === 0){
        index = 9; // premium forced
    }else{
        index = Math.floor(Math.random()*9);
    }

    const extra = 6 * 360;
    const target = (360 - index * angle) - (angle/2);

    rotation += extra + target;
    wheel.style.transform = `rotate(${rotation}deg)`;

    setTimeout(()=>{

        if(index === 9){
            showFinal();
        }else{
            showGift(document.querySelectorAll(".segment")[index].innerText);
        }

        if(spins === 0){
            btn.disabled = true;
            btn.innerText = "No Spins Left";
        }

    },6000);
}

function showGift(text){
    overlay.style.display="flex";
    title.innerText="🎁 You Won";
    msg.innerText=text;
}

function showFinal(){
    overlay.style.display="flex";
    title.innerText="🎉 CONGRATULATIONS 🎉";
    msg.innerHTML=`
💎 Premium Gift Unlocked<br><br>
<b>Adnan</b><br><br>
A special person who will stay, care, and support you in his own imperfect but real way 🤍
`;
    launchConfetti();
}

/* REAL canvas confetti */
const canvas = document.getElementById("confetti");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let pieces = [];

function launchConfetti(){
    for(let i=0;i<150;i++){
        pieces.push({
            x:Math.random()*canvas.width,
            y:-10,
            r:Math.random()*6+2,
            d:Math.random()*150,
            color:`hsl(${Math.random()*360},100%,60%)`
        });
    }
    animate();
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    pieces.forEach(p=>{
        ctx.beginPath();
        ctx.fillStyle=p.color;
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fill();
        p.y += 2 + p.r/2;
    });

    requestAnimationFrame(animate);
}

</script>

</body>
</html>
