<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Wheel</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0f172a;
    overflow:hidden;
}

.container{
    width:90vmin;
    height:90vmin;
    max-width:320px;
    max-height:320px;
    position:relative;
}

.wheel{
    width:100%;
    height:100%;
    border-radius:50%;
    position:relative;
    border:6px solid #fff3;
    transition:transform 5s ease-out;
}

/* small clean segments */
.segment{
    position:absolute;
    width:50%;
    height:50%;
    left:50%;
    top:50%;
    transform-origin:0% 0%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:9px;
    color:white;
    text-align:center;
}

/* colors */
.s1{background:#6366f1;}
.s2{background:#8b5cf6;}
.s3{background:#ec4899;}
.s4{background:#14b8a6;}
.s5{background:#f59e0b;}
.s6{background:#22c55e;}
.s7{background:#3b82f6;}
.s8{background:#ef4444;}
.s9{background:#a855f7;}
.s10{background:#ffd700; color:#000; font-weight:bold;}

button{
    position:absolute;
    bottom:-70px;
    left:50%;
    transform:translateX(-50%);
    padding:10px 20px;
    border:none;
    border-radius:20px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<div class="wheel" id="wheel">

<div class="segment s1" style="transform:rotate(0deg)">Kurti</div>
<div class="segment s2" style="transform:rotate(36deg)">Jhumka</div>
<div class="segment s3" style="transform:rotate(72deg)">Dress</div>
<div class="segment s4" style="transform:rotate(108deg)">Ring</div>
<div class="segment s5" style="transform:rotate(144deg)">Keychain</div>
<div class="segment s6" style="transform:rotate(180deg)">Shawarma</div>
<div class="segment s7" style="transform:rotate(216deg)">Hug</div>
<div class="segment s8" style="transform:rotate(252deg)">Choco</div>
<div class="segment s9" style="transform:rotate(288deg)">Care</div>
<div class="segment s10" style="transform:rotate(324deg)">ADNAN</div>

</div>

<button onclick="spin()">SPIN</button>

</div>

<script>

let rotation = 0;
const angle = 360/10;

function spin(){

    const wheel = document.getElementById("wheel");

    let index = Math.floor(Math.random()*10);

    const extra = 5*360;
    const target = (360 - index*angle) - (angle/2);

    rotation += extra + target;

    wheel.style.transform = `rotate(${rotation}deg)`;
}

</script>

</body>
</html>
