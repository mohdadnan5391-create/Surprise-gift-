
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clean Wheel</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0f172a;
    overflow:hidden;
}

/* responsive circle */
.wheel-box{
    width:min(90vw,320px);
    height:min(90vw,320px);
    position:relative;
}

/* pointer */
.pointer{
    position:absolute;
    top:-12px;
    left:50%;
    transform:translateX(-50%);
    width:0;
    height:0;
    border-left:10px solid transparent;
    border-right:10px solid transparent;
    border-bottom:18px solid white;
    z-index:10;
}

/* wheel */
.wheel{
    width:100%;
    height:100%;
    border-radius:50%;
    position:relative;
    transition:transform 5s cubic-bezier(0.12,0.8,0.1,1);
}

/* segment base */
.segment{
    position:absolute;
    width:50%;
    height:50%;
    top:50%;
    left:50%;
    transform-origin:0% 0%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:10px;
    color:white;
}

/* colors */
.c1{background:#6366f1;}
.c2{background:#8b5cf6;}
.c3{background:#ec4899;}
.c4{background:#14b8a6;}
.c5{background:#f59e0b;}
.c6{background:#22c55e;}
.c7{background:#3b82f6;}
.c8{background:#ef4444;}
.c9{background:#a855f7;}
.c10{background:#ffd700;color:#000;font-weight:bold;}
</style>
</head>

<body>

<div class="wheel-box">

<div class="pointer"></div>

<div class="wheel" id="wheel">

<!-- perfectly aligned 10 segments -->
<div class="segment c1" style="transform:rotate(0deg) translateY(-50%) rotate(0deg)">Kurti</div>
<div class="segment c2" style="transform:rotate(36deg) translateY(-50%) rotate(-36deg)">Jhumka</div>
<div class="segment c3" style="transform:rotate(72deg) translateY(-50%) rotate(-72deg)">Dress</div>
<div class="segment c4" style="transform:rotate(108deg) translateY(-50%) rotate(-108deg)">Ring</div>
<div class="segment c5" style="transform:rotate(144deg) translateY(-50%) rotate(-144deg)">Keychain</div>
<div class="segment c6" style="transform:rotate(180deg) translateY(-50%) rotate(-180deg)">Shawarma</div>
<div class="segment c7" style="transform:rotate(216deg) translateY(-50%) rotate(-216deg)">Hug</div>
<div class="segment c8" style="transform:rotate(252deg) translateY(-50%) rotate(-252deg)">Choco</div>
<div class="segment c9" style="transform:rotate(288deg) translateY(-50%) rotate(-288deg)">Care</div>
<div class="segment c10" style="transform:rotate(324deg) translateY(-50%) rotate(-324deg)">ADNAN</div>

</div>

</div>

<script>

let rotation = 0;
const angle = 360/10;

function spin(){

    const wheel = document.getElementById("wheel");

    let index = Math.floor(Math.random()*10);

    const extra = 5*360;
    const target = (360 - index*angle) - (angle/2);

    rotation += extra + target;

    wheel.style.transform = `rotate(${rotation}deg)`;
}

document.body.onclick = spin;

</script>

</body>
</html>
