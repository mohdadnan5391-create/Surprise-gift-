<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucky Draw</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:radial-gradient(circle,#1e1b4b,#0f172a);
    font-family:Arial;
    color:white;
    overflow:hidden;
}

.app{
    text-align:center;
    width:90vw;
    max-width:360px;
}

/* BOX */
.box{
    width:200px;
    height:200px;
    margin:auto;
    background:linear-gradient(145deg,#4f46e5,#9333ea);
    border-radius:20px;
    position:relative;
    box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

/* SHAKE */
.shake{
    animation:shake 0.5s infinite;
}

@keyframes shake{
    0%{transform:translate(0,0) rotate(0deg);}
    25%{transform:translate(3px,-3px) rotate(2deg);}
    50%{transform:translate(-3px,3px) rotate(-2deg);}
    75%{transform:translate(3px,3px) rotate(1deg);}
    100%{transform:translate(0,0) rotate(0deg);}
}

/* CARD */
.card{
    position:absolute;
    bottom:10px;
    left:50%;
    transform:translateX(-50%);
    width:80px;
    height:100px;
    background:white;
    color:#0f172a;
    border-radius:10px;
    display:none;
    align-items:center;
    justify-content:center;
    font-size:12px;
    font-weight:bold;
}

.drop{
    animation:drop 0.8s forwards;
}

@keyframes drop{
    0%{transform:translateX(-50%) translateY(0);opacity:0;}
    100%{transform:translateX(-50%) translateY(140px);opacity:1;}
}

/* BUTTON */
button{
    margin-top:18px;
    padding:10px 18px;
    border:none;
    border-radius:20px;
    font-weight:bold;
    cursor:pointer;
}

/* POPUP */
.popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.85);
    display:none;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.cardBox{
    background:rgba(255,255,255,0.1);
    border:1px solid rgba(255,255,255,0.2);
    padding:20px;
    border-radius:15px;
    text-align:center;
    max-width:300px;
}

img{
    width:100px;
    border-radius:10px;
    margin-bottom:10px;
}

/* BACK BUTTON */
.back{
    position:fixed;
    top:15px;
    left:15px;
    padding:8px 12px;
    border:none;
    border-radius:20px;
    font-weight:bold;
    background:white;
    color:#0f172a;
}
</style>
</head>

<body>

<button class="back" onclick="goBack()">← Back</button>

<div class="app">

<h2>🎟 Lucky Draw</h2>
<p>Shake the box to unlock your surprise</p>

<div class="box" id="box">

<div class="card" id="card" onclick="openReward()">
🎟 Tap Me
</div>

</div>

<button onclick="shakeBox()">SHAKE BOX 🎁</button>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
    <div class="cardBox">
        <img src="Screenshot_20260617_023132_com_google_android_apps_photos_SearchActivity.jpg ">
        <div><b>You found a perfect husband material 💎</b></div>
    </div>
</div>

<script>

let done = false;

function shakeBox(){

    if(done) return;

    const box = document.getElementById("box");
    const card = document.getElementById("card");

    box.classList.add("shake");

    setTimeout(()=>{
        box.classList.remove("shake");

        card.style.display="flex";
        card.classList.add("drop");

        done = true;

    },1500);
}

function openReward(){
    document.getElementById("popup").style.display="flex";
}

function goBack(){
    window.location.href = "gift.html";
}

</script>

</body>
</html>
